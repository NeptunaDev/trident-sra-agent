# /etc/nginx/conf.d/mi-servicio.conf

limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
limit_req_zone  $binary_remote_addr zone=req_limit:10m rate=30r/s;

# En Docker: host.docker.internal = host (donde corren API 3417 y WS 8080)
upstream api_backend {
    server host.docker.internal:3417;
    keepalive 32;
}

upstream ws_backend {
    server host.docker.internal:8080;
    keepalive 32;
}

server {
    listen 4040;
    server_name localhost tudominio.com;

    server_tokens off;
    client_max_body_size 10M;

    client_body_timeout   12s;
    client_header_timeout 12s;
    send_timeout          10s;

    # --- Agent API (3417) ---
    location /agent_api/ {
        limit_conn conn_limit 20;
        limit_req  zone=req_limit burst=50 nodelay;

        proxy_pass         http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # --- Agent Guacd WebSocket (8080) ---
    location /agent_guacd/ {
        limit_conn conn_limit 50;

        proxy_pass         http://ws_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 5s;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;

        proxy_buffering off;
    }

    access_log /var/log/nginx/mi-servicio.access.log;
    error_log  /var/log/nginx/mi-servicio.error.log warn;
}
