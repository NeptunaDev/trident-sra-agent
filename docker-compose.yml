services:
  guacd:
    image: guacamole/guacd:latest
    platform: linux/amd64  # Imagen solo amd64; en ARM (Mac M1/M2, etc.) corre por emulación
    container_name: guacamole-guacd
    ports:
      - "4822:4822"
    networks:
      - guacamole-network
    volumes:
    - ./data/recordings:/var/lib/guacamole/recordings # Para video (RDP/VNC)
    - ./data/typescript:/var/lib/guacamole/typescript # Para texto (SSH)
    restart: unless-stopped

  guacamole:
    image: guacamole/guacamole:latest
    container_name: guacamole-client
    depends_on:
      - guacd
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: "4822"

    ports:
      - "8081:8080"
    networks:
      - guacamole-network
    restart: unless-stopped
    
  # Solo en Linux con KVM. En Mac/ARM no existe /dev/kvm. Arrancar con: docker compose --profile windows up -d
  windows-rdp:
    profiles:
      - windows
    image: dockurr/windows
    container_name: windows-rdp-target
    devices:
      - /dev/kvm
    cap_add:
      - NET_ADMIN
    environment:
      #USERNAME: Administrator
      #PASSWORD: Windows123!
      VERSION: "10"
      RAM_SIZE: "2G"
    ports:
      - "8006:8006"
      - "3389:3389/tcp"
      - "3389:3389/udp" 
    volumes:
      - ./data/windows:/storage
      - /dev/kvm:/dev/kvm:rw
    networks:
      - guacamole-network
    restart: on-failure

  ubuntu-ssh:
    image: ubuntu:22.04
    container_name: ubuntu-ssh-target
    command: >
      bash -c "apt-get update &&
      apt-get install -y openssh-server sudo &&
      (id -u sshuser >/dev/null 2>&1 || (useradd -m -s /bin/bash sshuser && echo 'sshuser:Ubuntu123!' | chpasswd)) &&
      usermod -aG sudo sshuser &&
      mkdir -p /var/run/sshd &&
      /usr/sbin/sshd -D"
    ports:
      - "2222:22"
    networks:
      - guacamole-network
    restart: unless-stopped

  ubuntu-vnc:
    image: consol/ubuntu-xfce-vnc
    container_name: ubuntu-vnc-target
    environment:
      VNC_PW: Ubuntu123!
      VNC_RESOLUTION: 1920x1080
    ports:
      - "5900:5901"
    networks:
      - guacamole-network
    restart: unless-stopped

networks:
  guacamole-network:
    driver: bridge
