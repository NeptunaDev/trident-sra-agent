<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reproducir grabación</title>
  <style>
    body { margin: 0; background: #1e293b; color: #e2e8f0; font-family: system-ui, sans-serif; padding: 0.5rem; }
    .toolbar { margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .toolbar button { padding: 0.35rem 0.75rem; border-radius: 6px; border: none; cursor: pointer; background: #475569; color: #fff; }
    .toolbar button:hover:not(:disabled) { background: #64748b; }
    .toolbar button:disabled { opacity: 0.6; cursor: not-allowed; }
    .toolbar button.primary { background: #3b82f6; }
    .toolbar .progress-wrap { flex: 1; min-width: 120px; }
    .toolbar input[type="range"] { width: 100%; accent-color: #3b82f6; }
    #display-wrap { background: #000; border-radius: 8px; overflow: auto; min-height: 400px; display: flex; align-items: center; justify-content: center; }
    #display-wrap canvas { max-width: 100%; height: auto; }
    #status { padding: 0.5rem; color: #94a3b8; font-size: 0.9rem; }
    #status.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button type="button" id="btn-play" class="primary" disabled>Reproducir</button>
    <button type="button" id="btn-pause" disabled>Pausar</button>
    <div class="progress-wrap"><input type="range" id="progress" min="0" max="100" value="0" title="Progreso" /></div>
  </div>
  <div id="status">Cargando grabación…</div>
  <div id="display-wrap"></div>
  <script type="module" src="replay.js"></script>
</body>
</html>
